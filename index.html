<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>RecipeBook</title>
</head>
<body>
    <header class="header"> 
       <div class="logo">
         <span class="logo-icon">🍽</span>
         <span class="logo-text">APAGUNTAN DEMILADE</span>
       </div>
         <nav class="nav" id="nav">
    <a href="#" class="nav-link"> Home</a>
    <a href="#" class="nav-link"> Favourite</a>
    <a href="#" class="nav-link"> Shopping List</a>
         </nav>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <section class="hero">
            <h1 class="hero-title">
                Discover & Save <span> Delicious Recipes</span>
            </h1>
            <p class="hero-subtitle">
                    Cook Smarter. Eat Better . Plan your meals with ease.
            </p>
    </section>
    
    <main class="main">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search For your recipes" class="search-input">
            <select id="categoryFilter" class="category-select">
                <option value="all">All</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
                <option value="dessert">Dessert</option>
            </select>
            <button class="btn-add" id="openFormBtn"> Add Recipe</button>
        </div>
        <!-- Javascript will inject recipe cards here -->
        <div class="recipe-grid" id="recipegrid"></div>

        <div class="modal-overlay" id="modalOverlay" hidden></div>
        <div class="modal" id="modal" aria-hidden="true">
            <button class="modal-close" id="modalClose">X</button>
            <h2 class="modal-title">Add New Recipe</h2>
            <form id="recipeForm" class="recipe-form">
                <div class="form-group">
                    <label for="recipename">Recipe name</label>
                    <input type="text" id="recipename" name="name" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                        <option value="dessert">Dessert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ingredients">Ingredients</label>
                    <input type="text" id="ingredients" name="ingredients">
                </div>
                <div class="form-group">
                    <label for="instructions">Instructions</label>
                    <textarea id="instructions" name="instructions" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="image">Recipe Image (optional)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-add">Save Recipe</button>
                    <button type="button" class="btn-muted" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
     <div class="modal-overlay" id="modalOverlay">
       <div class="modal">
         <button class="modal-close" id="modalClose">X</button>
         <h2 id="modalTitle">Add New Recipe</h2>
        <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" id="recipeName" placeholder="e.g. Jollof Rice">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="recipeCategory">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
                <option value="dessert">Dessert</option>
            </select>
       </div>
       <div class="form-group">
            <label>Cuisine</label>
            <input type="text" id="recipeCuisine" placeholder="e.g. Nigerian, Italian">
        </div>
        <div class="form-group">
            <label>Ingredients</label>
            <textarea id="recipeIngredients" rows="5" placeholder="e.g. Rice&#10; Tomato&#10; Onions"></textarea>
        </div>
        <div class="form-group">
            <label>Instructions</label>
            <textarea id="recipeInstructions" rows="4" placeholder="step by step..."></textarea>
        </div>
        <div class="form-group">
           <label>Emoji (optional)</label>
           <input type="text" id="recipeEmoji" placeholder="e.g. 🍲">
        </div>
        <button class="btn-sumit" id="saveRecipeBtn">Save Recipe</button>
     </div>
     <div class="shopping-panel" id="shoppingPanel">
        <h2>Shopping List</h2>
        <div id="shoppingItems"></div>
        <button class="btn-close-panel" id="closeShoppingPanel">Close</button>
     </div>
    </main>
    <script src="app.js"></script>
    
</body>
</html>
